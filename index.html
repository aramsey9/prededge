<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PredEdge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:sans-serif;padding:16px 16px 40px}
h1{color:#00c896;font-size:22px;margin-bottom:4px}
.sub{color:#666;font-size:12px;margin-bottom:12px}
button{background:#00c896;color:#000;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;margin-bottom:12px}
.prog{background:#1a1a26;border-radius:8px;padding:12px;margin-bottom:12px;font-size:12px;color:#666}
.prog-bar{height:4px;background:#2a2a3d;border-radius:2px;margin-top:6px}
.prog-fill{height:100%;background:#00c896;border-radius:2px;transition:width .3s}
.box{background:#12121a;border:1px solid #2a2a3d;border-radius:8px;padding:12px;margin-bottom:10px;font-size:11px;font-family:monospace;color:#aaa;word-break:break-all;line-height:1.8}
.box h3{color:#00c896;font-size:12px;margin-bottom:6px;font-family:sans-serif;font-weight:bold}
.hi{color:#f59e0b}
.gr{color:#00c896}
</style>
</head>
<body>
<h1>PredEdge Debug</h1>
<div class="sub">Shows raw API data to fix matching</div>
<button onclick="go()">🔍 Run Debug</button>
<div id="prog" style="display:none" class="prog">
  <span id="pt">Loading...</span>
  <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
</div>
<div id="out"></div>
<script>
function sp(p,t){document.getElementById('pt').textContent=t;document.getElementById('pf').style.width=p+'%';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function tryFetch(url){
  var attempts=[
    ['corsproxy','https://corsproxy.io/?'+encodeURIComponent(url),false],
    ['allorigins-get','https://api.allorigins.win/get?url='+encodeURIComponent(url),true],
    ['allorigins-raw','https://api.allorigins.win/raw?url='+encodeURIComponent(url),false],
    ['direct',url,false]
  ];
  for(var i=0;i<attempts.length;i++){
    var name=attempts[i][0],u=attempts[i][1],isGet=attempts[i][2];
    try{
      var c=new AbortController();
      setTimeout(function(){c.abort();},15000);
      var r=await fetch(u,{signal:c.signal});
      if(!r.ok)continue;
      var t=await r.text();
      if(!t||t.length<5)continue;
      if(isGet){var w=JSON.parse(t);return{data:JSON.parse(w.contents),via:name};}
      return{data:JSON.parse(t),via:name};
    }catch(e){}
  }
  return null;
}

function getWords(s){
  return(s||'').toLowerCase().replace(/[^a-z0-9]/g,' ').split(' ').filter(function(w){return w.length>2;});
}

function shared(a,b){
  var wb=new Set(getWords(b));
  return getWords(a).filter(function(w){return wb.has(w);});
}

async function go(){
  document.getElementById('prog').style.display='block';
  document.getElementById('out').innerHTML='';
  var h='';

  sp(10,'Fetching Kalshi page 1...');
  var kr=await tryFetch('https://external-api.kalshi.com/trade-api/v2/markets?status=open&limit=10');

  sp(40,'Fetching Kalshi page 2 (cursor)...');
  var kr2=null;
  if(kr&&kr.data&&kr.data.cursor){
    kr2=await tryFetch('https://external-api.kalshi.com/trade-api/v2/markets?status=open&limit=10&cursor='+kr.data.cursor);
  }

  sp(60,'Fetching Polymarket...');
  var pr=await tryFetch('https://gamma-api.polymarket.com/markets?closed=false&active=true&limit=10&order=volume&ascending=false');

  sp(90,'Analyzing...');

  // Show Kalshi page 1 results
  if(kr&&kr.data&&kr.data.markets){
    var ms=kr.data.markets;
    h+='<div class="box"><h3>✅ KALSHI page 1 loaded via '+esc(kr.via)+' ('+ms.length+' markets)</h3>';
    h+='cursor: <span class="hi">'+esc(kr.data.cursor)+'</span><br><br>';
    h+='<b>First market all fields:</b><br>';
    var m=ms[0];
    Object.keys(m).forEach(function(k){
      var v=JSON.stringify(m[k]);
      if(v&&v!='null'&&v!='""'&&v!='0'&&v!='false')
        h+='<span class="hi">'+esc(k)+'</span>: <span class="gr">'+esc(v.slice(0,60))+'</span><br>';
    });
    h+='<br><b>All titles (title field):</b><br>';
    ms.forEach(function(m,i){h+=i+'. <span class="gr">'+esc(m.title)+'</span><br>';});
    h+='</div>';
  } else {
    h+='<div class="box" style="color:#ff4757">❌ KALSHI FAILED</div>';
  }

  // Show Kalshi page 2 (tests cursor pagination)
  if(kr2&&kr2.data&&kr2.data.markets){
    h+='<div class="box"><h3>✅ KALSHI page 2 via cursor ('+kr2.data.markets.length+' markets)</h3>';
    h+='Pagination works! Sample: <span class="gr">'+esc(kr2.data.markets[0]&&kr2.data.markets[0].title)+'</span>';
    h+='</div>';
  } else {
    h+='<div class="box" style="color:#f59e0b">⚠️ KALSHI page 2 failed or no cursor</div>';
  }

  // Show Polymarket results
  if(pr&&pr.data&&Array.isArray(pr.data)){
    var ps=pr.data;
    h+='<div class="box"><h3>✅ POLYMARKET loaded via '+esc(pr.via)+' ('+ps.length+' markets)</h3>';
    h+='<b>Top 5 questions:</b><br>';
    ps.slice(0,5).forEach(function(m,i){h+=i+'. <span class="gr">'+esc(m.question)+'</span><br>';});
    h+='</div>';
  } else {
    h+='<div class="box" style="color:#ff4757">❌ POLYMARKET FAILED</div>';
  }

  // Try matching
  if(kr&&kr.data&&kr.data.markets&&pr&&pr.data&&Array.isArray(pr.data)){
    h+='<div class="box"><h3>🔍 MATCH TEST — Kalshi vs Polymarket</h3>';
    var km=kr.data.markets;
    var pm=pr.data;
    km.slice(0,5).forEach(function(k){
      var titles=k.title?k.title.split(','):[k.yes_sub_title||''];
      titles.forEach(function(kt){
        kt=kt.trim();
        var bestShared=[],bestPM='',bestScore=0;
        pm.forEach(function(p){
          var s=shared(kt,p.question||'');
          if(s.length>bestScore){bestScore=s.length;bestShared=s;bestPM=p.question||'';}
        });
        h+='K: <span class="hi">'+esc(kt)+'</span><br>';
        h+='Best P: <span class="gr">'+esc(bestPM.slice(0,70))+'</span><br>';
        h+='Shared: <span style="color:#a78bfa">'+esc(bestShared.join(', '))+'</span><br><br>';
      });
    });
    h+='</div>';
  }

  sp(100,'Done');
  document.getElementById('prog').style.display='none';
  document.getElementById('out').innerHTML=h;
}
</script>
</body>
</html>
